<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Sahifa topilmadi | AIWEB.UZ</title>
<meta name="robots" content="noindex">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.container{
  max-width:600px;
  padding:20px;
}

h1{
  font-size:120px;
  font-weight:800;
  background:linear-gradient(45deg,#6c63ff,#00d4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:float 3s ease-in-out infinite;
}

h2{
  font-size:28px;
  margin:10px 0;
}

p{
  color:#aaa;
  margin-bottom:30px;
}

a{
  display:inline-block;
  padding:12px 25px;
  background:#6c63ff;
  color:#fff;
  border-radius:30px;
  text-decoration:none;
  transition:0.3s;
}

a:hover{
  background:#00d4ff;
  transform:scale(1.05);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* glow effect */
body::before{
  content:'';
  position:absolute;
  width:400px;
  height:400px;
  background:#6c63ff;
  filter:blur(150px);
  opacity:0.2;
  top:-100px;
  left:-100px;
}
</style>

</head>
<body>

<div class="container">
  <h1>404</h1>
  <h2>Sahifa topilmadi</h2>
  <p>Kechirasiz, siz qidirayotgan sahifa mavjud emas yoki o‘chirilgan.</p>
  
  <a href="/">🏠 Bosh sahifaga qaytish</a>
</div>

</body>
</html>
