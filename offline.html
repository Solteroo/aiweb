<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Offline | AIWEB.UZ</title>
<meta name="robots" content="noindex">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

.container{
  max-width:600px;
  padding:20px;
}

.icon{
  font-size:70px;
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{
  color:#aaa;
  margin-bottom:25px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#6c63ff,#00d4ff);
  color:#fff;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}

/* glow background */
body::before{
  content:'';
  position:absolute;
  width:400px;
  height:400px;
  background:#6c63ff;
  filter:blur(160px);
  opacity:0.25;
  top:-120px;
  right:-120px;
}
</style>

</head>
<body>

<div class="container">
  <div class="icon">📡</div>
  <h1>Internet yo‘q</h1>
  <p>Ulanish yo‘q. Iltimos internetni tekshiring va qayta urinib ko‘ring.</p>
  
  <button onclick="location.reload()">Qayta urinish</button>
</div>

</body>
</html>
